<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIGN_UP</title>
    <script src="/js/script.js" defer></script>
    <link rel="stylesheet" href="/css/logU.css">
</head>
<body>

<form id="userForm">
    <h2>Register on our site</h2>
    <div class="input-group">
        <label for="firstName">First Name (required):</label>
        <input type="text" name="firstName" id="firstName" placeholder="First Name" required/>
    </div>
    <div class="input-group">
        <label for="lastName">Last Name (required):</label>
        <input type="text" name="lastName" id="lastName" placeholder="Last Name" required/>
    </div>

    <div class="input-group">
        <label for="userName">Username (required):</label>
        <input type="text" name="userName" id="userName" placeholder="Username" required/>
    </div>
    <div class="input-group">
        <label for="phoneNumber">Phone Number (required):</label>
        <input type="text" name="phoneNumber" id="phoneNumber" placeholder="phoneNumber" required/>
    </div>
    <div class="input-group">
        <label for="email">Email (required):</label>
        <input type="email" name="email" id="email" placeholder="email" required/>
    </div>
    <div class="input-group">
        <label for="password">Password (required):</label>
        <input type="password" name="password" id="password" placeholder="password" required/>
    </div>
    <div class="input-group">
        <label for="confirmPassword">Confirm Password (required):</label>
        <input type="password" name="ConfirmPassword" id="confirmPassword" placeholder="password" required/>
    </div>
    <div class="input-group">
        <button type="submit" name="submit" id="submit">Submit</button>
    </div>
    <p class="switch">Already have an account?<a href="/login"> Login</a>
    </p>

</form>
<p class="or">OR</p>
<div class="google-container">
    <div id="g_id_onload"
         data-client_id="943861695899-ldjcl19tivb3tpqahbeururrnllu25ql.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
</div>
<div class="g_id_signin"
     data-type="standard"
     data-size="large"
     data-theme="outline"
     data-text="continue_with"
     data-shape="rectangular"
     data-logo_alignment="left">
</div>
</body>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</html>
