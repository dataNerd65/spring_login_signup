<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/css/logU.css">
</head>
<body>
<form id="loginForm">
    <h2>Login to our site</h2>

    <div class="input-group">
        <label for="userName">Username (required):</label>
        <input type="text" name="userName" id="userName" placeholder="username" required/>
    </div>
    <div class="input-group">
        <label for="password">Password (required):</label>
        <input type="password" name="password" id="password" placeholder="password" required/>
    </div>
    <div class="input-group">
        <button type="submit" name="submit" id="submit">Submit</button>
    </div>
    <p class="switch">Don't have an account?<a href="/register"> Register</a>
    </p>

</form>
<p class="or">OR</p>
<div class="google-container">
    <div id="g_id_onload"
         data-client_id="943861695899-ldjcl19tivb3tpqahbeururrnllu25ql.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="continue_with"
         data-shape="rectangular"
         data-logo_alignment="left">
    </div>
</div>


</body>
<script src="/js/login.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</html>
